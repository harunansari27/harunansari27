name: Generate 3D Contribution Graph

on:
  # Runs automatically every day at 18:00 UTC
  schedule:
    - cron: "0 18 * * *"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
  # Runs on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3D contribution graph" || echo "Nothing to commit"
          git push
