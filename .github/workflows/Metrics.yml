name: Generate Metrics Card

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # NOTE: create a Personal Access Token (classic) and add it as a
          # repo secret named METRICS_TOKEN (see setup notes).
          token: ${{ secrets.METRICS_TOKEN }}
          user: harunansari27
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata

          # 3D isometric contribution calendar — the "how is this possible" piece
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # language breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # coding habits & activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # top repos by stars
          plugin_topics: yes
          plugin_topics_mode: icons

          config_timezone: Asia/Kolkata
